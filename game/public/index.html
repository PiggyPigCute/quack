<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Quack</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div class="left-area">
    <h1>Quack</h1>
    <h3>Cartes jouées</h3>
    <div class="cards" id="firework"></div>
    
    <div class="bottom">
      <p>Rôle : <span id="role">connexion...</span></p>
      <p>Tour actuel : <span id="turn">-</span></p>
      <p>Cartes restantes dans le deck : <span id="deck-size">-</span></p>
      <button id="btn-new-game">Nouvelle partie</button>
    </div>
  </div>

  <div class="center-area">
    <h3>Ma main</h3>
    <div class="cards" id="player-hand"></div>
    
    <h3>L'autre main</h3>
    <div class="cards" id="other-hand"></div>
  
    <h3>Défausse</h3>
    <div class="cards" id="discard"></div>
  </div>

  <div class="right-area">
    <h3>Historique</h3>
    <div id="log"></div>

    <img src="img/quack.svg" alt="duck" class="duck bottom">
  </div>



  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js" defer></script></body>
</html>
