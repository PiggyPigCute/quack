<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Quack</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Quack</h1>
  <p>Rôle : <span id="role">connexion...</span></p>
  <p>Tour actuel : <span id="turn">-</span></p>
  <p>Cartes restantes dans le deck : <span id="deck-size">-</span></p>

  <div id="game-area" style="display:none;">
    <h3>Ma main</h3>
    <div class="cards" id="player-hand"></div>
    
    <h3>L'autre main</h3>
    <div class="cards" id="other-hand"></div>

    <h3>Défausse</h3>
    <div class="cards" id="discard"></div>

    <h3>Cartes jouées</h3>
    <div class="cards" id="firework"></div>
  </div>

  <div id="spec-area" style="display:none;">
    <p>Joueur 1 : <span id="spec-p1"></span> cartes en main</p>
    <p>Joueur 2 : <span id="spec-p2"></span> cartes en main</p>
  </div>

  <button id="btn-new-game">Nouvelle partie</button>

  <h3>Historique</h3>
  <div id="log"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js" defer></script></body>
</html>
